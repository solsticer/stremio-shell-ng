name: Build Windows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Configure MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Install Inno Setup translations
        shell: pwsh
        run: |
          $languageDir = Join-Path "${env:ProgramFiles(x86)}" "Inno Setup 6\Languages"
          $languages = @(
            "Armenian",
            "BrazilianPortuguese",
            "Bulgarian",
            "Catalan",
            "Corsican",
            "Czech",
            "Danish",
            "Dutch",
            "Finnish",
            "French",
            "German",
            "Hebrew",
            "Icelandic",
            "Italian",
            "Japanese",
            "Norwegian",
            "Polish",
            "Portuguese",
            "Russian",
            "Slovak",
            "Slovenian",
            "Spanish",
            "Turkish",
            "Ukrainian"
          )

          foreach ($language in $languages) {
            $target = Join-Path $languageDir "$language.isl"
            if (Test-Path -LiteralPath $target) {
              continue
            }

            $url = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/$language.isl"
            curl.exe --fail --location --silent --show-error --output $target $url
          }

      - name: Build shell
        shell: pwsh
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Build setup
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "setup\Stremio.iss"

      - name: Upload setup
        uses: actions/upload-artifact@v7
        with:
          name: StremioSetup-x64
          path: StremioSetup-v*_x64.exe
          if-no-files-found: error
          retention-days: 3
